  <line x1="60" y1="184" x2="98" y2="112" stroke="#0d0d12" stroke-width="9"/>
  <!-- two-tone star -->
  <g clip-path="url(#tw-star)">
    <rect x="150" y="26" width="28" height="52" fill="#1f6fb5"/>
    <rect x="178" y="26" width="28" height="52" fill="#f5b301"/>
