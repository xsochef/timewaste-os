// ---- FUSO ORARIO: gli orari si convertono nel fuso di chi guarda ----

const aheadDispositivo = (ds) => -(new Date((ds||oggi())+"T00:00:00").getTimezoneOffset());
// minuti a EST di UTC di una zona IANA per una certa data (per gli appuntamenti storici = Italia)
const aheadZona = (ds, zone) => { try{ const d=new Date((ds||oggi())+"T12:00:00Z"); const tz=new Date(d.toLocaleString('en-US',{timeZone:zone})); const u=new Date(d.toLocaleString('en-US',{timeZone:'UTC'})); return Math.round((tz-u)/60000); }catch(e){ return null; } };
// ora dell'appuntamento convertita nel fuso del dispositivo che guarda
const oraVista = (app) => {
  if(!app || !app.ora) return (app && app.ora) || "";
  const data = app.data || oggi();
  const aV = aheadDispositivo(data);
  let aC = (app.tzOff!=null) ? Number(app.tzOff) : aheadZona(data,'Europe/Rome'); // storici = orario studio Italia

  const p = (app.ora||"00:00").split(":"); let tot = (parseInt(p[0],10)||0)*60 + (parseInt(p[1],10)||0) + (aV - aC);
  tot = ((tot%1440)+1440)%1440;
  return String(Math.floor(tot/60)).padStart(2,"0")+":"+String(tot%60).padStart(2,"0");
};

  if(p.incassoId){ const inc=incassi.find(x=>x.id===p.incassoId); if(inc) return Number(inc.pagato)||0; }

};

function BarChart({data, color="#a78bfa"}) {
  const max = Math.max(1, ...data.map(d=>d.value));
  return (
    <div className="space-y-2">
      {data.map((d,i)=>(
        <div key={i} className="flex items-center gap-2">
          <div className="w-24 text-xs text-slate-400 truncate">{d.label}</div>
          <div className="flex-1 bg-[#0b0b13] rounded-full h-5 overflow-hidden">
            <div className="h-full rounded-full flex items-center justify-end px-2 text-[10px] font-bold text-black" style={{width:Math.max(8,(d.value/max)*100)+"%", background:color}}>{d.display||d.value}</div>
          </div>
        </div>
      ))}
      {data.length===0 && <p className="text-sm text-slate-500">Nessun dato.</p>}
    </div>
  );
}

// ---------- Grafico (Chart.js) ----------
function Grafico({ type, data, options, height=220 }) {
  const ref = React.useRef(null);
  const inst = React.useRef(null);
  const key = JSON.stringify({type, data, options});
  useEffect(()=>{
    if(!ref.current || !window.Chart) return;
    if(inst.current) inst.current.destroy();
    inst.current = new window.Chart(ref.current.getContext("2d"), { type, data, options });
    return ()=>{ if(inst.current){ inst.current.destroy(); inst.current=null; } };
  }, [key]);
  return <div style={{height}}><canvas ref={ref}></canvas></div>;
}
// sparkline compatta
function Sparkline({ valori, color="#a78bfa", height=48 }) {
  const data = { labels: valori.map((_,i)=>i), datasets:[{ data:valori, borderColor:color, backgroundColor:color+"22", fill:true, tension:.4, borderWidth:2, pointRadius:0 }] };
  const options = { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false},tooltip:{enabled:false}}, scales:{x:{display:false},y:{display:false}}, animation:false };
  return <Grafico type="line" data={data} options={options} height={height} />;
}

  const dataRef = React.useRef(data);
  useEffect(()=>{ dataRef.current = data; }, [data]);

  // carica iniziale da Supabase + realtime
  useEffect(()=>{
    if(!SUPA_ON){ caricato.current = true; return; }
    let canale;
    (async ()=>{
      try{
        const { data: row } = await supa.from('studio').select('data').eq('id',1).maybeSingle();
        if(row && row.data && Object.keys(row.data).length){
          remoto.current = true; setData(normalizza(row.data));
        } else {
          await supa.from('studio').upsert({ id:1, data: dataRef.current });  // primo riempimento col seed
        }
        setSync("synced");
      }catch(e){ setSync("error"); }
      caricato.current = true;
      canale = supa.channel('studio-rt')
        .on('postgres_changes', { event:'UPDATE', schema:'public', table:'studio', filter:'id=eq.1' },
            (payload)=>{ if(payload.new && payload.new.data){ remoto.current = true; setData(normalizza(payload.new.data)); setSync("synced"); } })
        .subscribe();
    })();
    return ()=>{ if(canale) supa.removeChannel(canale); };
  }, []);

  const setTarget = (v)=> setData && setData(d=>({...d, config:{...(d.config||{}), targetMensile:Number(v)||0}}));
  const gg = new Date(); const giorniMeseTot = new Date(gg.getFullYear(),gg.getMonth()+1,0).getDate(); const giorniPassati = gg.getDate();
  const proiezione = giorniPassati>0 ? Math.round(incassiMese/giorniPassati*giorniMeseTot) : 0;
  const percTarget = target>0 ? Math.min(100, Math.round(incassiMese/target*100)) : 0;

  const oggiApp = data.appuntamenti.filter(a=>a.data===oggi()).sort((a,b)=>(a.ora||"").localeCompare(b.ora||""));
  const segnaFatta = (id)=> setData && setData(d=>({...d, appuntamenti:d.appuntamenti.map(a=>a.id===id?{...a, stato:"Completato"}:a)}));
  const lunSett = (()=>{ const d=new Date(); const off=(d.getDay()+6)%7; d.setDate(d.getDate()-off); return d.toISOString().slice(0,10); })();
  const incSett = data.incassi.filter(i=>(i.data||"")>=lunSett).reduce((s,i)=>s+(Number(i.pagato)||0),0);

function Clienti({data, setData, user}) {
  const [modal, setModal] = useState(null); // null | {} | cliente
  const [q, setQ] = useState("");
  const [filtro, setFiltro] = useState("");
  const [ordina, setOrdina] = useState("nome"); // nome | spesa
  const [soloSaldo, setSoloSaldo] = useState(false);
  const [tagF, setTagF] = useState("");
  const [dett, setDett] = useState(null);
  const tagsDi = (c)=> (c.tags||"").split(",").map(t=>t.trim()).filter(Boolean);
  const allTags = [...new Set(data.clienti.flatMap(c=>tagsDi(c)))].sort();
  // LTV: speso per cliente + soglia VIP
  const spesoPer = useMemo(()=>{ const m={}; data.incassi.forEach(i=>{ m[i.clienteId]=(m[i.clienteId]||0)+(Number(i.pagato)||0); }); return m; },[data.incassi]);
  const saldoDi = (c)=> Math.max(0, (Number(c.prezzoConcordato)||0) - (spesoPer[c.id]||0));
  const vipSet = useMemo(()=>{ const spese=Object.values(spesoPer).filter(v=>v>0).sort((a,b)=>b-a); const soglia=spese.length?spese[Math.min(spese.length-1, Math.floor(spese.length*0.15))]:Infinity; return new Set(Object.keys(spesoPer).filter(id=>spesoPer[id]>0 && spesoPer[id]>=Math.max(300,soglia))); },[spesoPer]);
  const vuoto = {nome:"",genere:"",telefono:"",email:"",instagram:"",provenienza:"",stato:"Lead",pacchetto:"",assegnatoA:"",note:""};
  const salvaCliente = (c) => {
    setData(d=>{
      const clienti = c.id ? d.clienti.map(x=>x.id===c.id?c:x) : [...d.clienti, {...c, id:uid(), creato:oggi()}];
      return {...d, clienti};
    });
    toast("Cliente salvato ✓");
    setModal(null);
  };
  const elimina = (id) => { if(confirm("Eliminare questo cliente?")) setData(d=>({...d, clienti:d.clienti.filter(c=>c.id!==id)})); };
  const lista = data.clienti.filter(c=>(!q || c.nome.toLowerCase().includes(q.toLowerCase())) && (!filtro || c.stato===filtro) && (!soloSaldo || saldoDi(c)>0) && (!tagF || tagsDi(c).includes(tagF)))
    .sort((a,b)=> soloSaldo ? saldoDi(b)-saldoDi(a) : ordina==="spesa" ? (spesoPer[b.id]||0)-(spesoPer[a.id]||0) : a.nome.localeCompare(b.nome));
  const totDaSaldare = data.clienti.reduce((s,c)=>s+saldoDi(c),0);

  return (
    <div className="fade-in">
      <div className="flex flex-wrap items-center justify-between gap-3 mb-5">
        <h1 className="text-2xl font-black">Clienti / Artisti</h1>
        <Btn onClick={()=>setModal({...vuoto})}>+ Nuovo cliente</Btn>
      </div>
      <div className="flex flex-wrap gap-2 mb-4">
        <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Cerca per nome…" className={inputCls+" max-w-xs"} />
        <select value={filtro} onChange={e=>setFiltro(e.target.value)} className={inputCls+" max-w-[180px]"}>
          <option value="">Tutti gli stati</option>
          {STATI_CLIENTE.map(s=><option key={s} value={s}>{s}</option>)}
        </select>
        <select value={ordina} onChange={e=>setOrdina(e.target.value)} className={inputCls+" max-w-[180px]"}>
          <option value="nome">Ordina: Nome</option>
          <option value="spesa">Ordina: Spesa (alta→bassa)</option>
        </select>
        <button onClick={()=>setSoloSaldo(s=>!s)} className={"px-3 py-2 rounded-xl text-sm font-semibold border transition "+(soloSaldo?"bg-red-500/20 border-red-500/40 text-red-300":"border-[#26263a] text-slate-400 hover:bg-[#1a1a28]")}>Da saldare{totDaSaldare>0 && " · "+euro(totDaSaldare)}</button>
        {allTags.length>0 && (
          <select value={tagF} onChange={e=>setTagF(e.target.value)} className={inputCls+" max-w-[180px]"}>
            <option value="">Tutte le etichette</option>
            {allTags.map(t=><option key={t} value={t}>#{t}</option>)}
          </select>
        )}
      </div>
      <div className="grid md:grid-cols-2 gap-3">
        {lista.map(c=>(
          <Card key={c.id} className="hover:border-[#33334a] transition">
            <div className="flex items-start justify-between gap-2">
              <div className="min-w-0 cursor-pointer" onClick={()=>setDett(c)}>
                <div className="font-bold text-lg truncate flex items-center gap-1.5">{c.nome} {vipSet.has(c.id) && <span title="Cliente VIP" className="text-amber-400 text-sm">★ VIP</span>}</div>
                <div className="text-xs text-slate-400 mb-2">{c.genere} {c.provenienza && "· "+c.provenienza}</div>
                <div className="flex flex-wrap gap-1.5">
                  <Badge color={STATI_CLIENTE_COLORI[c.stato]||"#94a3b8"}>{c.stato}</Badge>
                  {spesoPer[c.id]>0 && <Badge color="#34d399">{euro(spesoPer[c.id])} spesi</Badge>}
                  {saldoDi(c)>0 && <Badge color="#f87171">saldo {euro(saldoDi(c))}</Badge>}
                  {Number(c.prezzoConcordato)>0 && saldoDi(c)===0 && <Badge color="#34d399">saldato ✓</Badge>}
                  {c.pacchetto && <Badge color="#a78bfa">{c.pacchetto}</Badge>}
                  {c.assegnatoA && <Badge color="#64748b">{c.assegnatoA}</Badge>}
                  {tagsDi(c).map(t=><Badge key={t} color="#22d3ee">#{t}</Badge>)}
                </div>
              </div>
              <div className="flex flex-col gap-1 shrink-0">
                <button onClick={()=>setDett(c)} className="text-xs text-violet-400 hover:text-violet-300">Dettagli</button>
                <button onClick={()=>setModal(c)} className="text-xs text-slate-400 hover:text-white">Modifica</button>
                <button onClick={()=>elimina(c.id)} className="text-xs text-red-400/70 hover:text-red-400">Elimina</button>
              </div>
            </div>
            {(c.telefono||c.email||c.instagram) &&
              <div className="mt-3 pt-3 border-t border-[#1d1d2b] text-xs text-slate-400 space-y-0.5">
                {c.telefono && <div>📞 {c.telefono}</div>}
                {c.email && <div>✉ {c.email}</div>}
                {c.instagram && <div>◎ {c.instagram}</div>}
              </div>}
            {c.note && <div className="mt-2 text-xs text-slate-500 italic">"{c.note}"</div>}
          </Card>
        ))}
        {lista.length===0 && <Card className="md:col-span-2 text-center text-slate-500 py-10">Nessun cliente. Aggiungi il primo artista col tasto in alto.</Card>}
      </div>

      {dett && (
        <Modal title={dett.nome} onClose={()=>setDett(null)}>
          <ClienteDettaglio cliente={dett} data={data} onEdit={()=>{ setModal(dett); setDett(null); }} />
        </Modal>
      )}

      {modal && (
        <Modal title={modal.id?"Modifica cliente":"Nuovo cliente"} onClose={()=>setModal(null)}>
          <ClienteForm cliente={modal} onSave={salvaCliente} />
        </Modal>
      )}
    </div>
  );
}
function ClienteDettaglio({cliente, data, onEdit}) {
  const apps = data.appuntamenti.filter(a=>a.clienteId===cliente.id);
  const incs = data.incassi.filter(i=>i.clienteId===cliente.id);
  const speso = incs.reduce((s,i)=>s+(Number(i.pagato)||0),0);
  const concordato = Number(cliente.prezzoConcordato)||0;
  const saldo = Math.max(0, concordato-speso);
  // timeline per data (unisce sessioni e pagamenti)
  const map = {};
  apps.forEach(a=>{ const o=map[a.data]||(map[a.data]={sess:[],pag:[]}); o.sess.push(a); });
  incs.forEach(i=>{ const o=map[i.data]||(map[i.data]={sess:[],pag:[]}); o.pag.push(i); });
  const date = Object.keys(map).sort().reverse();
  return (
    <div>
      <div className="grid grid-cols-3 gap-2 mb-4 text-center">
        <div className="bg-[#0b0b13] rounded-xl p-3"><div className="text-lg font-black text-emerald-400">{euro(speso)}</div><div className="text-[11px] text-slate-400">incassato</div></div>
        <div className="bg-[#0b0b13] rounded-xl p-3"><div className="text-lg font-black">{apps.length}</div><div className="text-[11px] text-slate-400">sessioni</div></div>
        <div className="bg-[#0b0b13] rounded-xl p-3"><div className={"text-lg font-black "+(saldo>0?"text-red-400":"text-slate-300")}>{concordato>0?euro(saldo):"—"}</div><div className="text-[11px] text-slate-400">saldo</div></div>
      </div>
      <div className="text-xs uppercase tracking-wide text-slate-500 font-semibold mb-2">Cronologia — quando è venuto e quanto ha pagato</div>
      <div className="space-y-2 max-h-[50vh] overflow-y-auto pr-1">
        {date.map(d=>{
          const o=map[d]; const pagGiorno=o.pag.reduce((s,i)=>s+(Number(i.pagato)||0),0);
          return (
            <div key={d} className="bg-[#0b0b13] rounded-xl p-3">
              <div className="flex items-center justify-between mb-1">
                <div className="text-sm font-bold">{dataIt(d)}</div>
                {pagGiorno>0 && <div className="text-sm font-black text-emerald-400">{euro(pagGiorno)}</div>}
              </div>
              {o.sess.map(a=><div key={a.id} className="text-xs text-slate-300">🎧 {a.ora && oraVista(a)+" · "}{a.tipo} {a.durata && "("+a.durata+"min)"}</div>)}
              {o.pag.map(i=><div key={i.id} className="text-xs text-slate-400">💶 {i.descrizione||"Pagamento"} · {i.metodo} {i.stato==="Acconto" && "· acconto"}</div>)}
              {o.sess.length===0 && o.pag.length>0 && <div className="text-[11px] text-slate-600">(pagamento senza sessione registrata)</div>}
            </div>
          );
        })}
        {date.length===0 && <p className="text-sm text-slate-500">Nessuna sessione o pagamento registrato per questo cliente.</p>}
      </div>
      <div className="flex justify-end mt-4"><Btn variant="ghost" onClick={onEdit}>Modifica scheda</Btn></div>
    </div>
  );
}

const MESI_IT = ["Gennaio","Febbraio","Marzo","Aprile","Maggio","Giugno","Luglio","Agosto","Settembre","Ottobre","Novembre","Dicembre"];
const GIORNI_IT = ["Lun","Mar","Mer","Gio","Ven","Sab","Dom"];
function Calendario({data, setData, user}) {
  const [modal, setModal] = useState(null);
  const [giorno, setGiorno] = useState(null); // data del giorno aperto (vista giorno)
  const [vista, setVista] = useState("mese"); // "mese" | "settimana" | "lista"
  const [settRef, setSettRef] = useState(()=>{ const dts=data.appuntamenti.map(a=>a.data).filter(Boolean).sort(); return lunediISO(dts.length?dts[dts.length-1]:oggi()); });
  const provv = data.provvigioni||[];
  const provvDiApp = (appId)=> provv.find(p=>p.appuntamentoId===appId && p.stato!=="rifiutata");
  const richiediProvvigione = (app, perc)=>{
    setData(d=>{
      const list = d.provvigioni||[];
      const esiste = list.find(p=>p.appuntamentoId===app.id && p.stato!=="rifiutata");
      const provvigioni = esiste
        ? list.map(p=>p.appuntamentoId===app.id?{...p, perc:Number(perc), stato:"richiesta"}:p)
        : [...list, {id:uid(), appuntamentoId:app.id, clienteId:app.clienteId, dataSessione:app.data, perc:Number(perc), stato:"richiesta", richiestoDa:UTENTI[user].nome, creata:oggi()}];
      return {...d, provvigioni};
    });
    toast("Richiesta di provvigione inviata ✓");
    setModal(null);
  };
  // mese iniziale: quello dell'ultimo appuntamento presente (così atterra sui dati)
  const [ref, setRef] = useState(()=>{
    const dts = data.appuntamenti.map(a=>a.data).filter(Boolean).sort();
    const base = dts.length ? new Date(dts[dts.length-1]+"T00:00:00") : new Date();
    return new Date(base.getFullYear(), base.getMonth(), 1);
  });
  const vuoto = {clienteId:"",tipo:"Sessione studio",data:oggi(),ora:"15:00",durata:"60",assegnatoA:"",stato:"Programmato",note:""};
  const salvaApp = (a) => {
    const {_genIncasso, _importo, _metodo, _clienteNome, ...appBase} = a;
    setData(d=>{
      let clienti = d.clienti;
      let clienteId = appBase.clienteId || "";
      const nomeWanted = (_clienteNome||"").trim();
      if(nomeWanted){
        const found = d.clienti.find(c=>(c.nome||"").trim().toLowerCase()===nomeWanted.toLowerCase());
        if(found){ clienteId = found.id; }
        else {
          const nc = {id:uid(), nome:nomeWanted, genere:"", telefono:"", email:"", instagram:"", provenienza:"Italia", stato:"Lead", pacchetto:"", assegnatoA:"", note:"", creato:oggi()};
          clienti = [...d.clienti, nc]; clienteId = nc.id;
        }
      }
      const app = {...appBase, clienteId, tzOff: aheadDispositivo(appBase.data||oggi())}; // orario salvato nel fuso di chi salva
      const appId = app.id || uid();
      const appuntamenti = app.id ? d.appuntamenti.map(x=>x.id===app.id?app:x) : [...d.appuntamenti,{...app,id:appId,creato:oggi()}];
      let incassi = d.incassi;
      if(_genIncasso && Number(_importo)>0){
        incassi = [...incassi, {id:uid(), clienteId:clienteId, appuntamentoId:appId, descrizione:app.tipo||"Sessione", totale:Number(_importo), pagato:Number(_importo), metodo:_metodo||"Contanti", stato:"Saldato", data:app.data||oggi(), registratoDa:"Carlo"}];
      }
      return {...d, clienti, appuntamenti, incassi};
    });
    toast("Appuntamento salvato ✓");
    setModal(null);
  };
  const elimina = (id)=>{ if(confirm("Eliminare l'appuntamento?")) setData(d=>({...d,appuntamenti:d.appuntamenti.filter(a=>a.id!==id)})); };
  const nome = (id)=>(data.clienti.find(c=>c.id===id)||{}).nome||"—";
  const coloreStato = (s)=> s==="Completato"?"#34d399":s==="Annullato"?"#f87171":"#fbbf24";

  // ---- griglia mese ----
  const y = ref.getFullYear(), m = ref.getMonth();
  const pad = (n)=>String(n).padStart(2,"0");
  const ymd = (d)=> y+"-"+pad(m+1)+"-"+pad(d);
  const offset = (new Date(y,m,1).getDay()+6)%7; // lun=0
  const giorniMese = new Date(y,m+1,0).getDate();
  const celle = [...Array(offset).fill(null), ...Array.from({length:giorniMese},(_,i)=>i+1)];
  const meseStr = y+"-"+pad(m+1);
  const perGiorno = {};
  data.appuntamenti.forEach(a=>{ if((a.data||"").startsWith(meseStr)){ (perGiorno[a.data]=perGiorno[a.data]||[]).push(a); } });
  Object.values(perGiorno).forEach(arr=>arr.sort((a,b)=>(a.ora||"").localeCompare(b.ora||"")));
  const vaiMese = (delta)=> setRef(new Date(y, m+delta, 1));

  // ---- vista settimana ----
  const giorniSett = Array.from({length:7},(_,k)=>{ const d=new Date(settRef+"T00:00:00"); d.setDate(d.getDate()+k); return d.toISOString().slice(0,10); });
  const perGiornoSettV = {};
  data.appuntamenti.forEach(a=>{ if(giorniSett.includes(a.data)){ (perGiornoSettV[a.data]=perGiornoSettV[a.data]||[]).push(a); } });
  Object.values(perGiornoSettV).forEach(arr=>arr.sort((a,b)=>(a.ora||"").localeCompare(b.ora||"")));
  const vaiSett = (delta)=>{ const d=new Date(settRef+"T00:00:00"); d.setDate(d.getDate()+delta*7); setSettRef(d.toISOString().slice(0,10)); };
  const rangeSettLabel = (()=>{ const a=new Date(settRef+"T00:00:00"); const b=new Date(a); b.setDate(a.getDate()+6); const f=x=>x.toLocaleDateString("it-IT",{day:"2-digit",month:"short"}); return f(a)+" – "+f(b); })();

  // ---- vista lista ----
  const ordinati = [...data.appuntamenti].sort((a,b)=>(b.data+b.ora).localeCompare(a.data+a.ora));
  const gruppi = {};
  ordinati.forEach(a=>{ (gruppi[a.data]=gruppi[a.data]||[]).push(a); });

  return (
    <div className="fade-in">
      <div className="flex flex-wrap items-center justify-between gap-3 mb-5">
        <h1 className="text-2xl font-black">Appuntamenti</h1>
        <div className="flex items-center gap-2">
          <div className="flex rounded-xl border border-[#26263a] overflow-hidden">
            <button onClick={()=>setVista("mese")} className={"px-3 py-2 text-sm font-semibold "+(vista==="mese"?"bg-violet-500 text-white":"text-slate-400 hover:bg-[#1a1a28]")}>Mese</button>
            <button onClick={()=>setVista("settimana")} className={"px-3 py-2 text-sm font-semibold "+(vista==="settimana"?"bg-violet-500 text-white":"text-slate-400 hover:bg-[#1a1a28]")}>Settimana</button>
            <button onClick={()=>setVista("lista")} className={"px-3 py-2 text-sm font-semibold "+(vista==="lista"?"bg-violet-500 text-white":"text-slate-400 hover:bg-[#1a1a28]")}>Lista</button>
          </div>
          <Btn onClick={()=>setModal({...vuoto})}>+ Nuovo</Btn>
        </div>
      </div>

      {vista==="mese" ? (
        <Card className="p-3 md:p-4">
          <div className="flex items-center justify-between mb-3 px-1">
            <button onClick={()=>vaiMese(-1)} className="px-3 py-1.5 rounded-lg hover:bg-[#1a1a28] text-slate-300">‹</button>
            <div className="flex items-center gap-3">
              <div className="font-bold text-lg">{MESI_IT[m]} {y}</div>
              <button onClick={()=>setRef(new Date(new Date().getFullYear(), new Date().getMonth(), 1))} className="text-xs px-2 py-1 rounded-lg border border-[#26263a] text-slate-400 hover:text-white">Oggi</button>
            </div>
            <button onClick={()=>vaiMese(1)} className="px-3 py-1.5 rounded-lg hover:bg-[#1a1a28] text-slate-300">›</button>
          </div>
          <div className="grid grid-cols-7 gap-1 mb-1">
            {GIORNI_IT.map(g=><div key={g} className="text-center text-[11px] uppercase tracking-wide text-slate-500 font-semibold py-1">{g}</div>)}
          </div>
          <div className="grid grid-cols-7 gap-1">
            {celle.map((d,i)=>{
              if(d===null) return <div key={"e"+i} className="min-h-[58px]"></div>;
              const key=ymd(d); const apps=perGiorno[key]||[]; const isToday=key===oggi();
              return (
                <div key={key} onClick={()=>setGiorno(key)}
                  className={"min-h-[58px] rounded-lg border p-1 cursor-pointer transition hover:border-violet-500/60 flex flex-col items-center justify-start gap-1 "+(isToday?"border-violet-500/60 bg-violet-500/5":"border-[#1d1d2b] bg-[#0b0b13]")}>
                  <div className={"text-sm font-bold w-7 h-7 grid place-items-center rounded-full "+(isToday?"bg-violet-500 text-white":"text-slate-300")}>{d}</div>
                  {apps.length>0 && (
                    <div className="flex items-center justify-center gap-0.5">
                      {apps.slice(0,3).map((a,ix)=>{ const pr=provvDiApp(a.id); const col=pr?PROV_COLORI[pr.stato]:coloreStato(a.stato); return <span key={ix} className="w-1.5 h-1.5 rounded-full" style={{background:col}}></span>; })}
                      {apps.length>3 && <span className="text-[9px] text-slate-400 ml-0.5">+{apps.length-3}</span>}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
          <p className="text-[11px] text-slate-500 mt-3 px-1">Tocca un giorno per vederne gli appuntamenti e crearne · il puntino segna i giorni con sessioni</p>
        </Card>
      ) : vista==="settimana" ? (
        <Card className="p-3 md:p-4">
          <div className="flex items-center justify-between mb-3 px-1">
            <button onClick={()=>vaiSett(-1)} className="px-3 py-1.5 rounded-lg hover:bg-[#1a1a28] text-slate-300">‹</button>
            <div className="flex items-center gap-3">
              <div className="font-bold text-lg">{rangeSettLabel}</div>
              <button onClick={()=>setSettRef(lunediISO(oggi()))} className="text-xs px-2 py-1 rounded-lg border border-[#26263a] text-slate-400 hover:text-white">Oggi</button>
            </div>
            <button onClick={()=>vaiSett(1)} className="px-3 py-1.5 rounded-lg hover:bg-[#1a1a28] text-slate-300">›</button>
          </div>
          <div className="grid grid-cols-1 sm:grid-cols-7 gap-2">
            {giorniSett.map((key,idx)=>{ const apps=perGiornoSettV[key]||[]; const isToday=key===oggi(); return (
              <div key={key} className={"rounded-lg border p-2 min-h-[110px] "+(isToday?"border-violet-500 bg-violet-500/5":"border-[#1d1d2b] bg-[#0b0b13]")}>
                <div className="flex items-center justify-between mb-2">
                  <div className={"text-xs font-bold "+(isToday?"text-violet-300":"text-slate-400")}>{GIORNI_IT[idx]} {new Date(key+"T00:00:00").getDate()}</div>
                  <button onClick={()=>setModal({...vuoto, data:key})} title="Nuovo" className="text-sm text-violet-400 hover:text-violet-300 leading-none">+</button>
                </div>
                <div className="space-y-1">
                  {apps.map(a=>{ const pr=provvDiApp(a.id); const col=pr?PROV_COLORI[pr.stato]:coloreStato(a.stato); return (
                    <div key={a.id} onClick={()=>setModal(a)} className="text-[11px] leading-tight rounded px-1.5 py-1 cursor-pointer truncate" style={{background:col+"22",color:col,borderLeft:"2px solid "+col}} title={oraVista(a)+" "+a.tipo+" · "+nome(a.clienteId)}>
                      <span className="font-bold">{oraVista(a)}</span> {nome(a.clienteId)}
                    </div>
                  );})}
                  {apps.length===0 && <div className="text-[10px] text-slate-600">—</div>}
                </div>
              </div>
            );})}
          </div>
          <p className="text-[11px] text-slate-500 mt-3 px-1">Vista settimana · tocca + per aggiungere, un appuntamento per aprirlo · orari nel fuso del tuo dispositivo</p>
        </Card>
      ) : (
        <div className="space-y-5">
          {Object.keys(gruppi).map(g=>(
            <div key={g}>
              <div className="text-xs uppercase tracking-wide text-slate-400 mb-2 font-semibold">{dataIt(g)}{g===oggi() && <span className="text-violet-400"> · oggi</span>}</div>
              <div className="space-y-2">
                {gruppi[g].sort((a,b)=>a.ora.localeCompare(b.ora)).map(a=>(
                  <Card key={a.id} className="flex items-center gap-4 py-3">
                    <div className="text-center w-14 shrink-0"><div className="text-lg font-black">{oraVista(a)}</div><div className="text-[10px] text-slate-500">{a.durata}min</div></div>
                    <div className="flex-1 min-w-0">
                      <div className="text-base font-bold truncate">{nome(a.clienteId)}</div>
                      <div className="text-xs text-slate-400 truncate">{a.tipo}{a.assegnatoA && " · "+a.assegnatoA}</div>
                      {a.note && <div className="text-xs text-slate-500 italic truncate">{a.note}</div>}
                    </div>
                    <Badge color={coloreStato(a.stato)}>{a.stato}</Badge>
                    <div className="flex flex-col gap-1 shrink-0">
                      <button onClick={()=>setModal(a)} className="text-xs text-slate-400 hover:text-white">Modifica</button>
                      <button onClick={()=>elimina(a.id)} className="text-xs text-red-400/70 hover:text-red-400">Elimina</button>
                    </div>
                  </Card>
                ))}
              </div>
            </div>
          ))}
          {ordinati.length===0 && <Card className="text-center text-slate-500 py-10">Nessun appuntamento. Creane uno col tasto in alto.</Card>}
        </div>
      )}

      {giorno && (()=>{ const appG=data.appuntamenti.filter(a=>a.data===giorno).sort((a,b)=>(a.ora||"").localeCompare(b.ora||"")); return (
        <Modal title={dataIt(giorno)} onClose={()=>setGiorno(null)}>
          <div className="text-xs text-slate-500 mb-3">{appG.length} appuntament{appG.length===1?"o":"i"}</div>
          <div className="space-y-2 max-h-[55vh] overflow-y-auto pr-1">
            {appG.map(a=>(
              <div key={a.id} onClick={()=>{ setGiorno(null); setModal(a); }} className="flex items-center gap-3 p-2 rounded-lg bg-[#0b0b13] cursor-pointer hover:bg-[#141420]">
                <div className="text-center w-12 shrink-0"><div className="text-base font-black">{oraVista(a)}</div><div className="text-[10px] text-slate-500">{a.durata}min</div></div>
                <div className="flex-1 min-w-0"><div className="text-base font-bold truncate">{nome(a.clienteId)}</div><div className="text-xs text-slate-400 truncate">{a.tipo}{a.assegnatoA && " · "+a.assegnatoA}</div></div>
                <Badge color={coloreStato(a.stato)}>{a.stato}</Badge>
              </div>
            ))}
            {appG.length===0 && <p className="text-sm text-slate-500 py-4 text-center">Nessun appuntamento in questo giorno.</p>}
          </div>
          <div className="flex justify-end mt-4">
            <Btn onClick={()=>{ const d=giorno; setGiorno(null); setModal({...vuoto, data:d}); }}>+ Nuovo appuntamento</Btn>
          </div>
        </Modal>
      );})()}

      {modal && (
        <Modal title={modal.id?"Modifica appuntamento":"Nuovo appuntamento"} onClose={()=>setModal(null)}>
          <AppForm app={modal} clienti={data.clienti} onSave={salvaApp} onDelete={modal.id?()=>{elimina(modal.id);setModal(null);}:null}
            user={user} provv={modal.id?provvDiApp(modal.id):null} onProvvigione={richiediProvvigione} />
        </Modal>
      )}
    </div>
  );
}
function AppForm({app, clienti, onSave, onDelete, user, provv, onProvvigione}) {
  const [a, setA] = useState(()=>({...app, ora: app.id ? oraVista(app) : (app.ora||"15:00"), _clienteNome: app.clienteId ? ((clienti.find(c=>c.id===app.clienteId)||{}).nome||"") : (app._clienteNome||"") }));
  const [percP, setPercP] = useState(provv?String(provv.perc):"10");
  const set=(k,v)=>setA(p=>({...p,[k]:v}));
  const puoProvv = user==="francesco" && a.id && a.creato; // solo sessioni nuove (inserite da oggi)
  const salva = ()=>{ if(!(a._clienteNome||"").trim()){ alert("Inserisci il nome dell'artista"); return; } onSave(a); };
  return (
    <div>
      <Field label="Artista *">
        <input value={a._clienteNome||""} onChange={e=>set("_clienteNome",e.target.value)} list="clientiList" placeholder="Scrivi il nome — se non esiste viene creato" className={inputCls} />
        <datalist id="clientiList">{clienti.map(c=><option key={c.id} value={c.nome} />)}</datalist>
      </Field>
      <Field label="Tipo"><Select value={a.tipo} onChange={e=>set("tipo",e.target.value)} options={TIPI_APPUNTAMENTO} /></Field>
      <div className="grid grid-cols-3 gap-3">
        <Field label="Data"><input type="date" value={a.data} onChange={e=>set("data",e.target.value)} className={inputCls} /></Field>
        <Field label="Ora"><input type="time" value={a.ora} onChange={e=>set("ora",e.target.value)} className={inputCls} /></Field>
        <Field label="Durata (min)"><Input type="number" value={a.durata} onChange={e=>set("durata",e.target.value)} /></Field>
      </div>
      <div className="grid grid-cols-2 gap-3">
        <Field label="Assegnato a"><Select value={a.assegnatoA} onChange={e=>set("assegnatoA",e.target.value)} options={["Giuseppe","Carlo","Francesco"]} placeholder="Chi se ne occupa" /></Field>
        <Field label="Stato"><Select value={a.stato} onChange={e=>set("stato",e.target.value)} options={STATI_APP} /></Field>
      </div>
      <Field label="Note"><Textarea value={a.note} onChange={e=>set("note",e.target.value)} /></Field>
      {!a.id && (
        <div className="bg-[#0b0b13] border border-[#1d1d2b] rounded-xl p-3 mb-2">
          <label className="flex items-center gap-2 text-sm font-medium cursor-pointer">
            <input type="checkbox" checked={!!a._genIncasso} onChange={e=>set("_genIncasso",e.target.checked)} />
            Sessione già pagata → registra incasso
          </label>
          {a._genIncasso && (
            <div className="grid grid-cols-2 gap-3 mt-3">
              <Field label="Importo (€)"><Input type="number" value={a._importo||""} onChange={e=>set("_importo",e.target.value)} /></Field>
              <Field label="Metodo"><Select value={a._metodo||"Contanti"} onChange={e=>set("_metodo",e.target.value)} options={METODI} /></Field>
            </div>
          )}
        </div>
      )}
      {puoProvv && (
        <div className="bg-[#0b0b13] border border-[#1d1d2b] rounded-xl p-3 mb-2">
          <div className="text-sm font-medium mb-2">Provvigione {provv && <span style={{color:PROV_COLORI[provv.stato]}}>· {provv.perc}% ({provv.stato})</span>}</div>
          <div className="flex items-center gap-2">
            <select value={percP} onChange={e=>setPercP(e.target.value)} className={inputCls+" max-w-[110px]"}>
              <option value="10">10%</option>
              <option value="15">15%</option>
              <option value="20">20%</option>
            </select>
            <Btn variant="ghost" onClick={()=>onProvvigione(a, percP)}>{provv?"Aggiorna richiesta":"Richiedi provvigione"}</Btn>
          </div>
          <p className="text-[11px] text-slate-500 mt-2">La richiesta va approvata da Giuseppe. Si calcola sul pagamento registrato per questa sessione.</p>
        </div>
      )}
      {user==="francesco" && a.id && !a.creato && (
        <p className="text-[11px] text-slate-500 mb-2">Provvigione non disponibile: sessione importata dallo storico (solo sessioni nuove).</p>
      )}
      <div className="flex justify-between items-center mt-2">
        {onDelete ? <Btn variant="danger" onClick={onDelete}>Elimina</Btn> : <span></span>}
        <Btn onClick={salva}>Salva</Btn>
      </div>
    </div>
  );
}

  );
}

// ============================================================
//  FATTURATO / INCASSI
// ============================================================
function Fatturato({data, setData, user}) {
  const [modal, setModal] = useState(null);
  const [ordine, setOrdine] = useState("recenti"); // recenti | vecchi
  const [meseF, setMeseF] = useState("");
  const [raggr, setRaggr] = useState("elenco"); // elenco | mese | settimana
  const vuoto = {clienteId:"",descrizione:"",totale:"",pagato:"",metodo:"Bonifico",stato:"",data:oggi(),registratoDa:UTENTI[user].nome};
  const salvaInc = (i) => {
    const {_clienteNome, ...base} = i;
    const t=Number(base.totale)||0, p=Number(base.pagato)||0;
    const auto = (p>=t && t>0) ? "Saldato" : (p>0 ? "Acconto" : "Da pagare");
    setData(d=>{
      let clienti = d.clienti;
      let clienteId = base.clienteId || "";
      const nomeWanted = (_clienteNome||"").trim();
      if(nomeWanted){
        const found = d.clienti.find(c=>(c.nome||"").trim().toLowerCase()===nomeWanted.toLowerCase());
        if(found){ clienteId = found.id; }
        else {
          const nc = {id:uid(), nome:nomeWanted, genere:"", telefono:"", email:"", instagram:"", provenienza:"Italia", stato:"Lead", pacchetto:"", assegnatoA:"", note:"", creato:oggi()};
          clienti = [...d.clienti, nc]; clienteId = nc.id;
        }
      } else { clienteId = ""; }
      const rec = {...base, clienteId, stato: base.stato || auto};
      const incassi = rec.id ? d.incassi.map(x=>x.id===rec.id?rec:x) : [...d.incassi,{...rec,id:uid()}];
      return {...d, clienti, incassi};
    });
    toast("Incasso registrato ✓");
    setModal(null);
  };
  const elimina=(id)=>{ if(confirm("Eliminare la voce?")) setData(d=>({...d,incassi:d.incassi.filter(i=>i.id!==id)})); };
  const nome=(id)=>(data.clienti.find(c=>c.id===id)||{}).nome||"Generico";

  const totFatturato = data.incassi.reduce((s,i)=>s+(Number(i.totale)||0),0);
  const totIncassato = data.incassi.reduce((s,i)=>s+(Number(i.pagato)||0),0);
  const totDovuto = totFatturato-totIncassato;
  const mesiDisp = [...new Set(data.incassi.map(i=>(i.data||"").slice(0,7)).filter(Boolean))].sort().reverse();
  const etichettaMese = (m)=> new Date(m+"-01").toLocaleDateString("it-IT",{month:"long",year:"numeric"});
  const ordinati=[...data.incassi]
    .filter(i=>!meseF || (i.data||"").startsWith(meseF))
    .sort((a,b)=> ordine==="vecchi" ? (a.data||"").localeCompare(b.data||"") : (b.data||"").localeCompare(a.data||""));
  // vista settimanale (per Carlo): lordo, spese fisse, netto
  const cfgF=data.config||{};
  const localeF = cfgF.speseLocale!=null?Number(cfgF.speseLocale):200;
  const benzinaF = cfgF.speseBenzina!=null?Number(cfgF.speseBenzina):100;
  const speseSettF = localeF+benzinaF;
  const lunediF=(ds)=>{ const d=new Date(ds+"T00:00:00"); const off=(d.getDay()+6)%7; d.setDate(d.getDate()-off); return d.toISOString().slice(0,10); };
  const rangeSettF=(w)=>{ const a=new Date(w+"T00:00:00"); const b=new Date(a); b.setDate(a.getDate()+6); const f=x=>x.toLocaleDateString("it-IT",{day:"2-digit",month:"short"}); return f(a)+" – "+f(b); };
  // settimana corrente
  const settW = lunediF(oggi());
  const lordoW = data.incassi.filter(i=>i.data && lunediF(i.data)===settW).reduce((s,i)=>s+(Number(i.pagato)||0),0);
  const targetW = 5000;
  const provvW = (data.provvigioni||[]).filter(p=>["approvata","liquidata"].includes(p.stato) && lunediF(p.dataSessione)===settW).reduce((s,p)=>s+provImporto(p,data.incassi),0);
  const nettoW = Math.max(0, lordoW - speseSettF - provvW);
  const percW = Math.min(100, Math.round(lordoW/targetW*100));
  const splitPercF = cfgF.splitPerc!=null?Number(cfgF.splitPerc):50;
  const nomeAF = cfgF.quotaA||"Quota A"; const nomeBF = cfgF.quotaB||"Quota B";
  const qAF = nettoW*splitPercF/100; const qBF = nettoW-qAF;
  // riepiloghi aggregati (per Giuseppe): lordo, spese fisse+provv, netto, quote
  const provvSettMap = {};
  (data.provvigioni||[]).filter(p=>["approvata","liquidata"].includes(p.stato)).forEach(p=>{ if(!p.dataSessione) return; const w=lunediF(p.dataSessione); provvSettMap[w]=(provvSettMap[w]||0)+provImporto(p,data.incassi); });
  const settRows = (()=>{ const m={}; data.incassi.forEach(i=>{ if(!i.data) return; const w=lunediF(i.data); if(!m[w]) m[w]={lordo:0,n:0}; m[w].lordo+=(Number(i.pagato)||0); m[w].n++; });
    return Object.keys(m).sort().reverse().map(w=>{ const lordo=m[w].lordo; const prov=provvSettMap[w]||0; const spese=speseSettF+prov; const netto=Math.max(0,lordo-spese); const qa=netto*splitPercF/100; return { key:w, n:m[w].n, lordo, spese, netto, qa, qb:netto-qa }; }); })();
  const meseRows = (()=>{ const m={}; settRows.forEach(r=>{ const mo=r.key.slice(0,7); if(!m[mo]) m[mo]={n:0,lordo:0,spese:0,netto:0,qa:0,qb:0}; const o=m[mo]; o.n+=r.n; o.lordo+=r.lordo; o.spese+=r.spese; o.netto+=r.netto; o.qa+=r.qa; o.qb+=r.qb; });
    return Object.entries(m).sort((a,b)=>b[0].localeCompare(a[0])); })();

  return (
    <div className="fade-in">
      <div className="flex flex-wrap items-center justify-between gap-3 mb-5">
        <h1 className="text-2xl font-black">Fatturato & Incassi</h1>
        <Btn onClick={()=>setModal({...vuoto})}>+ Registra incasso</Btn>
      </div>
      <div className="flex flex-wrap gap-2 mb-4">
        <select value={ordine} onChange={e=>setOrdine(e.target.value)} className={inputCls+" max-w-[200px]"}>
          <option value="recenti">Dal più recente</option>
          <option value="vecchi">Dal più vecchio</option>
        </select>
        <select value={meseF} onChange={e=>setMeseF(e.target.value)} className={inputCls+" max-w-[200px]"}>
          <option value="">Tutti i mesi</option>
          {mesiDisp.map(m=><option key={m} value={m}>{etichettaMese(m)}</option>)}
        </select>
        <span className="text-xs text-slate-500 self-center">{ordinati.length} voci{VEDE_TOTALI[user] && " · "+euro(ordinati.reduce((s,i)=>s+(Number(i.pagato)||0),0))}</span>
      </div>
      {VEDE_TOTALI[user] && (
        <div className="grid grid-cols-3 gap-3 mb-5">
          <Card><div className="text-xs text-slate-400">Fatturato totale</div><div className="text-xl font-black">{euro(totFatturato)}</div>{(()=>{ const p=data.incassi.map(i=>i.data).filter(Boolean).sort()[0]; return p?<div className="text-[10px] text-slate-600 mt-0.5">dal {dataIt(p)}</div>:null; })()}</Card>
          <Card><div className="text-xs text-slate-400">Incassato</div><div className="text-xl font-black text-emerald-400">{euro(totIncassato)}</div></Card>
          <Card><div className="text-xs text-slate-400">Da incassare</div><div className="text-xl font-black text-red-400">{euro(totDovuto)}</div></Card>
        </div>
      )}
      {VEDE_TOTALI[user] && (
        <div className="flex rounded-xl border border-[#26263a] overflow-hidden w-max mb-4">
          {[["elenco","Elenco"],["settimana","Per settimana"],["mese","Per mese"]].map(([k,l])=>(
            <button key={k} onClick={()=>setRaggr(k)} className={"px-3 py-2 text-sm font-semibold "+(raggr===k?"bg-violet-500 text-white":"text-slate-400 hover:bg-[#1a1a28]")}>{l}</button>
          ))}
        </div>
      )}
      {VEDE_TOTALI[user] && raggr==="mese" && (
        <Card className="overflow-x-auto mb-5">
          <table className="w-full text-sm min-w-[620px]">
            <thead><tr className="text-left text-xs uppercase tracking-wide text-slate-500 border-b border-[#1d1d2b]"><th className="py-2 pr-2">Mese</th><th className="py-2 px-2 text-right">Lordo</th><th className="py-2 px-2 text-right">Spese</th><th className="py-2 px-2 text-right">Netto</th><th className="py-2 px-2 text-right text-emerald-400">{nomeAF}</th><th className="py-2 pl-2 text-right text-violet-400">{nomeBF}</th></tr></thead>
            <tbody>
              {meseRows.map(([k,v])=>(
                <tr key={k} className="border-b border-[#15151f]">
                  <td className="py-2 pr-2 font-medium capitalize">{etichettaMese(k)}</td>
                  <td className="py-2 px-2 text-right">{euro(v.lordo)}</td>
                  <td className="py-2 px-2 text-right text-red-400">−{euro(v.spese)}</td>
                  <td className="py-2 px-2 text-right font-semibold">{euro(v.netto)}</td>
                  <td className="py-2 px-2 text-right text-emerald-400 font-bold">{euro(v.qa)}</td>
                  <td className="py-2 pl-2 text-right text-violet-400 font-bold">{euro(v.qb)}</td>
                </tr>
              ))}
              {meseRows.length===0 && <tr><td colSpan={6} className="py-8 text-center text-slate-500">Nessun incasso.</td></tr>}
            </tbody>
          </table>
          <p className="text-[11px] text-slate-500 mt-3">Spese = locale + benzina di ogni settimana del mese + provvigioni. Netto diviso {splitPercF}/{100-splitPercF}.</p>
        </Card>
      )}
      {VEDE_TOTALI[user] && raggr==="settimana" && (
        <Card className="overflow-x-auto mb-5">
          <table className="w-full text-sm min-w-[620px]">
            <thead><tr className="text-left text-xs uppercase tracking-wide text-slate-500 border-b border-[#1d1d2b]"><th className="py-2 pr-2">Settimana</th><th className="py-2 px-2 text-right">Lordo</th><th className="py-2 px-2 text-right">Spese</th><th className="py-2 px-2 text-right">Netto</th><th className="py-2 px-2 text-right text-emerald-400">{nomeAF}</th><th className="py-2 pl-2 text-right text-violet-400">{nomeBF}</th></tr></thead>
            <tbody>
              {settRows.map(r=>(
                <tr key={r.key} className="border-b border-[#15151f]">
                  <td className="py-2 pr-2 font-medium">{rangeSettF(r.key)}</td>
                  <td className="py-2 px-2 text-right">{euro(r.lordo)}</td>
                  <td className="py-2 px-2 text-right text-red-400">−{euro(r.spese)}</td>
                  <td className="py-2 px-2 text-right font-semibold">{euro(r.netto)}</td>
                  <td className="py-2 px-2 text-right text-emerald-400 font-bold">{euro(r.qa)}</td>
                  <td className="py-2 pl-2 text-right text-violet-400 font-bold">{euro(r.qb)}</td>
                </tr>
              ))}
              {settRows.length===0 && <tr><td colSpan={6} className="py-8 text-center text-slate-500">Nessun incasso.</td></tr>}
            </tbody>
          </table>
          <p className="text-[11px] text-slate-500 mt-3">Spese = {euro(localeF)} locale + {euro(benzinaF)} benzina + provvigioni. Netto diviso {splitPercF}/{100-splitPercF}.</p>
        </Card>
      )}
      {!VEDE_TOTALI[user] && (
        <Card className="mb-5">
          <div className="flex items-center justify-between mb-3">
            <h3 className="font-bold">Settimana corrente</h3>
            <span className="text-xs text-slate-400">{rangeSettF(settW)}</span>
          </div>
          <div className="flex justify-between text-sm mb-1">
            <span className="text-slate-400">Lordo <span className="font-bold text-slate-200">{euro(lordoW)}</span> / target {euro(targetW)}</span>
            <span className="font-bold" style={{color:percW>=100?"#34d399":"#a78bfa"}}>{percW}%</span>
          </div>
          <div className="bg-[#0b0b13] rounded-full h-4 overflow-hidden mb-4"><div className="h-full rounded-full" style={{width:percW+"%", background:percW>=100?"#34d399":"#a78bfa"}}></div></div>
          <div className="grid grid-cols-2 sm:grid-cols-5 gap-3 text-center">
            <div className="bg-[#0b0b13] rounded-xl p-3"><div className="text-lg font-black">{euro(lordoW)}</div><div className="text-[11px] text-slate-400">lordo</div></div>
            <div className="bg-[#0b0b13] rounded-xl p-3"><div className="text-lg font-black text-red-400">−{euro(speseSettF)}</div><div className="text-[11px] text-slate-400">spese fisse</div></div>
            <div className="bg-[#0b0b13] rounded-xl p-3"><div className="text-lg font-black text-red-400">{provvW>0?"−"+euro(provvW):"—"}</div><div className="text-[11px] text-slate-400">provvigioni</div></div>
            <div className="bg-[#0b0b13] rounded-xl p-3"><div className="text-lg font-black">{euro(nettoW)}</div><div className="text-[11px] text-slate-400">netto</div></div>
            <div className="bg-[#0b0b13] rounded-xl p-3"><div className="text-lg font-black text-emerald-400">{euro(qAF)} / {euro(qBF)}</div><div className="text-[11px] text-slate-400">{nomeAF} / {nomeBF}</div></div>
          </div>
          <p className="text-[11px] text-slate-500 mt-3">Spese fisse: {euro(localeF)} locale + {euro(benzinaF)} benzina = {euro(speseSettF)}, più provvigioni Francesco · ripartizione {splitPercF}/{100-splitPercF}.</p>
        </Card>
      )}
      {(!VEDE_TOTALI[user] || raggr==="elenco") && <div className="space-y-2">
        {ordinati.map(i=>(
          <Card key={i.id} className="flex items-center gap-4 py-3">
            <div className="flex-1 min-w-0">
              <div className="font-semibold truncate">{nome(i.clienteId)} <span className="text-slate-400 font-normal">· {i.descrizione||"—"}</span></div>
              <div className="text-xs text-slate-400">{dataIt(i.data)} · {i.metodo} · reg. {i.registratoDa}</div>
            </div>
            <div className="text-right shrink-0">
              <div className="font-bold">{euro(i.pagato)} <span className="text-slate-500 font-normal text-xs">/ {euro(i.totale)}</span></div>
              <Badge color={i.stato==="Saldato"?"#34d399":i.stato==="Acconto"?"#fbbf24":"#f87171"}>{i.stato}</Badge>
            </div>
            <div className="flex flex-col gap-1 shrink-0">
              <button onClick={()=>setModal(i)} className="text-xs text-slate-400 hover:text-white">Modifica</button>
              <button onClick={()=>elimina(i.id)} className="text-xs text-red-400/70 hover:text-red-400">Elimina</button>
            </div>
          </Card>
        ))}
        {ordinati.length===0 && <Card className="text-center text-slate-500 py-10">Nessun incasso registrato.</Card>}
      </div>}

      {modal && (
        <Modal title={modal.id?"Modifica incasso":"Registra incasso"} onClose={()=>setModal(null)}>
          <IncassoForm inc={modal} clienti={data.clienti} appuntamenti={data.appuntamenti} onSave={salvaInc} />
        </Modal>
      )}
    </div>
  );
}
function IncassoForm({inc, clienti, appuntamenti, onSave}) {
  const [i,setI]=useState(()=>({...inc, _clienteNome: inc.clienteId ? ((clienti.find(c=>c.id===inc.clienteId)||{}).nome||"") : (inc._clienteNome||"") }));
  const set=(k,v)=>setI(p=>({...p,[k]:v}));
  const nomeCli = id => (clienti.find(c=>c.id===id)||{}).nome||"—";
  const wanted = (i._clienteNome||"").trim().toLowerCase();
  const cliMatch = clienti.find(c=>(c.nome||"").trim().toLowerCase()===wanted);
  const cliId = cliMatch ? cliMatch.id : null;
  // mostra TUTTI gli appuntamenti, con quelli del cliente del pagamento in cima, poi per data recente
  const appList = (appuntamenti||[]).slice().sort((a,b)=>{
    const am = (cliId && a.clienteId===cliId)?0:1, bm = (cliId && b.clienteId===cliId)?0:1;
    if(am!==bm) return am-bm;
    return ((b.data||"")+(b.ora||"")).localeCompare((a.data||"")+(a.ora||""));
  }).slice(0,60);
  return (
    <div>
      <Field label="Cliente / Artista">
        <input value={i._clienteNome||""} onChange={e=>set("_clienteNome",e.target.value)} list="clientiListInc" placeholder="Scrivi il nome — se non esiste viene creato (vuoto = generico)" className={inputCls} />
        <datalist id="clientiListInc">{clienti.map(c=><option key={c.id} value={c.nome} />)}</datalist>
      </Field>
      <Field label="Collega ad appuntamento (facoltativo)">
        <select value={i.appuntamentoId||""} onChange={e=>set("appuntamentoId", e.target.value)} className={inputCls}>
          <option value="">— nessuno —</option>
          {appList.map(a=><option key={a.id} value={a.id}>{dataIt(a.data)} {oraVista(a)} · {a.tipo} · {nomeCli(a.clienteId)}</option>)}
        </select>
      </Field>
      <Field label="Tipo di lavoro">
        <input value={i.descrizione} onChange={e=>set("descrizione",e.target.value)} list="tipiLavoroInc" placeholder="Scegli o scrivi…" className={inputCls} />
        <datalist id="tipiLavoroInc">{TIPI_LAVORO_INC.map(t=><option key={t} value={t} />)}</datalist>
      </Field>
      <div className="grid grid-cols-2 gap-3">
        <Field label="Importo totale (€)"><Input type="number" value={i.totale} onChange={e=>set("totale",e.target.value)} /></Field>
        <Field label="Pagato ora (€)"><Input type="number" value={i.pagato} onChange={e=>set("pagato",e.target.value)} /></Field>
      </div>
      <div className="grid grid-cols-2 gap-3">
        <Field label="Metodo"><Select value={i.metodo} onChange={e=>set("metodo",e.target.value)} options={METODI} /></Field>
        <Field label="Data"><input type="date" value={i.data} onChange={e=>set("data",e.target.value)} className={inputCls} /></Field>
      </div>
      <div className="grid grid-cols-2 gap-3">
        <Field label="Stato pagamento">
          <select value={i.stato||""} onChange={e=>set("stato",e.target.value)} className={inputCls}>
            <option value="">(automatico)</option>
            {STATI_PAGAMENTO.map(s=><option key={s} value={s}>{s}</option>)}
          </select>
        </Field>
        <Field label="Registrato da"><Input value={i.registratoDa||""} onChange={e=>set("registratoDa",e.target.value)} /></Field>
      </div>
      <div className="flex justify-end mt-2"><Btn onClick={()=>onSave(i)}>Salva</Btn></div>
    </div>
  );
}

function Report({data}) {
  // fatturato per mese (ultimi 6)
  const mesi=[]; const d=new Date();
  for(let k=5;k>=0;k--){ const m=new Date(d.getFullYear(),d.getMonth()-k,1); mesi.push(m.toISOString().slice(0,7)); }
  const perMese = mesi.map(m=>{
    const v=data.incassi.filter(i=>(i.data||"").slice(0,7)===m).reduce((s,i)=>s+(Number(i.pagato)||0),0);
    return {label:new Date(m+"-01").toLocaleDateString("it-IT",{month:"short"}), value:Math.round(v), display:euro(v)};
  });
  const perStato = STATI_CLIENTE.map(s=>({label:s, value:data.clienti.filter(c=>c.stato===s).length})).filter(x=>x.value>0);
  const perProv = PROVENIENZE.map(p=>({label:p, value:data.clienti.filter(c=>c.provenienza===p).length})).filter(x=>x.value>0);
  const perGenere = GENERI.map(g=>({label:g, value:data.clienti.filter(c=>c.genere===g).length})).filter(x=>x.value>0);

  // incassi per tipo di lavoro (parola chiave nella descrizione)
  const TIPI = [["Registrazione","rec"],["Mix","mix"],["Master","master"],["Beat/Prod","beat"],["Affitto sala","affitto"],["Brano/Pacchetto","brano|pacchetto|testo|songwriting"]];
  const perTipo = TIPI.map(([label,kw])=>{ const re=new RegExp(kw,"i"); const v=data.incassi.filter(i=>re.test(i.descrizione||"")).reduce((s,i)=>s+(Number(i.pagato)||0),0); return {label, value:Math.round(v), display:euro(v)}; }).filter(x=>x.value>0).sort((a,b)=>b.value-a.value);
  // incassi per metodo
  const metMap={}; data.incassi.forEach(i=>{ const k=i.metodo||"Altro"; metMap[k]=(metMap[k]||0)+(Number(i.pagato)||0); });
  const perMetodo = Object.entries(metMap).map(([label,v])=>({label, value:Math.round(v), display:euro(v)})).sort((a,b)=>b.value-a.value);
  // occupazione studio
  const giorniSett=["Lun","Mar","Mer","Gio","Ven","Sab","Dom"];
  const perGiornoSett = giorniSett.map((g,idx)=>({label:g, value:data.appuntamenti.filter(a=>{ if(!a.data) return false; const d=new Date(a.data+"T00:00:00"); return ((d.getDay()+6)%7)===idx; }).length}));
  const fasce=[["Mattina (8–13)",8,13],["Pomeriggio (13–18)",13,18],["Sera (18–24)",18,24]];
  const perFascia = fasce.map(([label,a,b])=>({label, value:data.appuntamenti.filter(x=>{ const h=parseInt((x.ora||"").slice(0,2)); return h>=a && h<b; }).length})).filter(x=>x.value>0);

  // ---- configurazioni Chart.js ----
  const GRID="#1b1b28", TICK="#94a3b8";
  const PALETTE=["#a78bfa","#22d3ee","#34d399","#fbbf24","#f472b6","#60a5fa","#fb923c"];
  const lineMese = {
    data:{ labels:perMese.map(x=>x.label), datasets:[{ data:perMese.map(x=>x.value), borderColor:"#a78bfa", backgroundColor:"#a78bfa22", fill:true, tension:.4, borderWidth:2, pointRadius:3, pointBackgroundColor:"#a78bfa" }] },
    options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}, tooltip:{callbacks:{label:(c)=>euro(c.parsed.y)}}}, scales:{ x:{grid:{color:GRID},ticks:{color:TICK}}, y:{grid:{color:GRID},ticks:{color:TICK, callback:(v)=>"€"+v}} } }
  };
  const doughnut=(arr)=>({ data:{ labels:arr.map(x=>x.label), datasets:[{ data:arr.map(x=>x.value), backgroundColor:PALETTE, borderColor:"#0b0b13", borderWidth:2 }] }, options:{ responsive:true, maintainAspectRatio:false, cutout:"60%", plugins:{ legend:{position:"bottom", labels:{color:TICK, boxWidth:12, padding:10, font:{size:11}}}, tooltip:{callbacks:{label:(c)=>c.label+": "+euro(c.parsed)}} } } });
  const barH=(arr,color,euroFmt)=>({ data:{ labels:arr.map(x=>x.label), datasets:[{ data:arr.map(x=>x.value), backgroundColor:color, borderRadius:6, maxBarThickness:22 }] }, options:{ indexAxis:"y", responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}, tooltip:{callbacks:{label:(c)=> euroFmt?euro(c.parsed.x):c.parsed.x}}}, scales:{ x:{grid:{color:GRID},ticks:{color:TICK}}, y:{grid:{display:false},ticks:{color:TICK}} } } });

  return (
    <div className="fade-in">
      <h1 className="text-2xl font-black mb-5">Report & Statistiche</h1>
      <div className="grid lg:grid-cols-2 gap-4">
        <Card className="lg:col-span-2"><h3 className="font-bold mb-4">Incassi ultimi 6 mesi</h3><Grafico type="line" data={lineMese.data} options={lineMese.options} height={220} /></Card>
        <Card><h3 className="font-bold mb-4">Incassi per tipo di lavoro</h3>{perTipo.length?<Grafico type="doughnut" data={doughnut(perTipo).data} options={doughnut(perTipo).options} height={240} />:<p className="text-sm text-slate-500">Nessun dato.</p>}</Card>
        <Card><h3 className="font-bold mb-4">Incassi per metodo</h3>{perMetodo.length?<Grafico type="doughnut" data={doughnut(perMetodo).data} options={doughnut(perMetodo).options} height={240} />:<p className="text-sm text-slate-500">Nessun dato.</p>}</Card>
        <Card><h3 className="font-bold mb-4">Occupazione per giorno</h3><Grafico type="bar" data={barH(perGiornoSett,"#60a5fa").data} options={barH(perGiornoSett,"#60a5fa").options} height={200} /></Card>

//  RADAR CLIENTI DORMIENTI
// ============================================================
function Radar({data, setData}) {
  const [soglia, setSoglia] = useState(30);
  const [copiato, setCopiato] = useState(null);
  const ultimaPer = useMemo(()=>{ const m={}; data.appuntamenti.forEach(a=>{ if(a.clienteId && a.data){ if(!m[a.clienteId]||a.data>m[a.clienteId]) m[a.clienteId]=a.data; } }); return m; },[data.appuntamenti]);
  const spesoPer = useMemo(()=>{ const m={}; data.incassi.forEach(i=>{ m[i.clienteId]=(m[i.clienteId]||0)+(Number(i.pagato)||0); }); return m; },[data.incassi]);
  const giorniFa = (d)=> d ? Math.floor((new Date(oggi()+"T00:00:00") - new Date(d+"T00:00:00"))/86400000) : null;
  const recente = (c)=> c.ultimoContatto && giorniFa(c.ultimoContatto)<14;
  const dormienti = data.clienti
    .map(c=>({c, ultima:ultimaPer[c.id], gg:giorniFa(ultimaPer[c.id]), speso:spesoPer[c.id]||0}))
    .filter(x=> x.ultima && x.gg>=soglia && x.c.stato!=="In pausa" && !recente(x.c))
    .sort((a,b)=> b.speso-a.speso || b.gg-a.gg);
  const msg = (nome)=> "Ciao "+nome+"! 🎧 Come butta con la musica? È un po' che non passi in studio. Se vuoi chiudere un pezzo o ripartire con qualcosa di nuovo ti tengo uno slot. Fammi sapere! — Time Waste Studio";
  const waLink = (c)=>{ const t=encodeURIComponent(msg(c.nome)); const tel=(c.telefono||"").replace(/[^0-9]/g,""); return tel ? "https://wa.me/"+tel+"?text="+t : "https://wa.me/?text="+t; };
  const copia = (c)=>{ try{ navigator.clipboard.writeText(msg(c.nome)); setCopiato(c.id); setTimeout(()=>setCopiato(null),1500);}catch(e){} };
  const segna = (id)=> setData(d=>({...d, clienti:d.clienti.map(c=>c.id===id?{...c, ultimoContatto:oggi()}:c)}));

  return (
    <div className="fade-in">
      <div className="flex flex-wrap items-center justify-between gap-3 mb-2">
        <h1 className="text-2xl font-black">Radar dormienti</h1>
        <select value={soglia} onChange={e=>setSoglia(Number(e.target.value))} className={inputCls+" max-w-[200px]"}>
          <option value={30}>Inattivi da 30+ giorni</option>
          <option value={45}>Inattivi da 45+ giorni</option>
          <option value={60}>Inattivi da 60+ giorni</option>
          <option value={90}>Inattivi da 90+ giorni</option>
        </select>
      </div>
      <p className="text-slate-400 text-sm mb-5">{dormienti.length} artisti da ricontattare, ordinati per valore. Riportarne in studio anche pochi vale tanto.</p>
      <div className="grid md:grid-cols-2 gap-3">
        {dormienti.map(({c,ultima,gg,speso})=>(
          <Card key={c.id}>
            <div className="flex items-start justify-between gap-2">
              <div className="min-w-0">
                <div className="font-bold text-lg truncate">{c.nome} {speso>=300 && <span className="text-amber-400 text-sm">★</span>}</div>
                <div className="text-xs text-slate-400">Ultima sessione {dataIt(ultima)} · <span className="text-red-400 font-semibold">{gg} giorni fa</span></div>
                <div className="flex flex-wrap gap-1.5 mt-2">
                  {speso>0 && <Badge color="#34d399">{euro(speso)} storici</Badge>}
                  {c.genere && <Badge color="#64748b">{c.genere}</Badge>}
                  {c.ultimoContatto && <Badge color="#a78bfa">ricontattato {dataIt(c.ultimoContatto)}</Badge>}
                </div>
              </div>
            </div>
            <div className="flex flex-wrap gap-2 mt-3">
              <a href={waLink(c)} target="_blank" rel="noopener" className="px-3 py-1.5 rounded-xl text-xs font-semibold bg-emerald-500 hover:bg-emerald-400 text-black">WhatsApp</a>
              <button onClick={()=>copia(c)} className="px-3 py-1.5 rounded-xl text-xs font-semibold bg-transparent border border-[#26263a] text-slate-300 hover:bg-[#1a1a28]">{copiato===c.id?"Copiato ✓":"Copia messaggio"}</button>
              <button onClick={()=>segna(c.id)} className="px-3 py-1.5 rounded-xl text-xs font-semibold bg-transparent border border-[#26263a] text-slate-300 hover:bg-[#1a1a28]">Segna ricontattato</button>
            </div>
          </Card>
        ))}
        {dormienti.length===0 && <Card className="md:col-span-2 text-center text-slate-500 py-10">Nessun cliente dormiente con questa soglia. 🎯</Card>}
      </div>
    </div>
  );
}

// ============================================================
function Cassa({data, setData}) {
  const mesi = [...new Set(data.incassi.map(i=>(i.data||"").slice(0,7)).filter(Boolean))].sort().reverse();
  const [periodo, setPeriodo] = useState("tutto");
  const cfg = data.config||{};
  const locale  = cfg.speseLocale  != null ? Number(cfg.speseLocale)  : 200;
  const benzina = cfg.speseBenzina != null ? Number(cfg.speseBenzina) : 100;
  const splitPerc = cfg.splitPerc  != null ? Number(cfg.splitPerc)    : 50;
  const setCfg = (k,v)=> setData(d=>({...d, config:{...(d.config||{}), [k]:Math.max(0,Number(v)||0)}}));
  const nomeA = cfg.quotaA || "Quota A"; const nomeB = cfg.quotaB || "Quota B";
  const speseSett = locale + benzina;
  const etichettaMese = (m)=> new Date(m+"-01").toLocaleDateString("it-IT",{month:"long",year:"numeric"});

  const filtro = periodo==="tutto" ? data.incassi : data.incassi.filter(i=>(i.data||"").startsWith(periodo));
  // raggruppa per settimana (lunedì)
  const lunedi = (ds)=>{ const d=new Date(ds+"T00:00:00"); const off=(d.getDay()+6)%7; d.setDate(d.getDate()-off); return d.toISOString().slice(0,10); };
  const range = (w)=>{ const a=new Date(w+"T00:00:00"); const b=new Date(a); b.setDate(a.getDate()+6); const f=(x)=>x.toLocaleDateString("it-IT",{day:"2-digit",month:"short"}); return f(a)+" – "+f(b); };
  const W = {};
  filtro.forEach(i=>{ if(!i.data) return; const w=lunedi(i.data); const o=W[w]||(W[w]={inc:0,Contanti:0,Carta:0,Altro:0}); const imp=Number(i.pagato)||0; o.inc+=imp; const k=i.metodo==="Contanti"?"Contanti":i.metodo==="Carta"?"Carta":"Altro"; o[k]+=imp; });
  const provvList = data.provvigioni||[];
  const provvSett = (w)=> provvList.filter(p=>["approvata","liquidata"].includes(p.stato) && lunediISO(p.dataSessione)===w).reduce((s,p)=>s+provImporto(p,data.incassi),0);
  const settimane = Object.keys(W).sort().reverse().map(w=>{ const o=W[w]; const prov=provvSett(w); const netto=Math.max(0,o.inc-speseSett-prov); const a=netto*splitPerc/100; return {w, ...o, spese:speseSett, prov, netto, quotaA:a, quotaB:netto-a}; });
  const tot = settimane.reduce((s,x)=>({inc:s.inc+x.inc, contanti:s.contanti+x.Contanti, carta:s.carta+x.Carta, spese:s.spese+x.spese, prov:s.prov+x.prov, netto:s.netto+x.netto, qA:s.qA+x.quotaA, qB:s.qB+x.quotaB}), {inc:0,contanti:0,carta:0,spese:0,prov:0,netto:0,qA:0,qB:0});

  return (
    <div className="fade-in">
      <div className="flex flex-wrap items-center justify-between gap-3 mb-5">
        <h1 className="text-2xl font-black">Cassa & divisione</h1>
        <select value={periodo} onChange={e=>setPeriodo(e.target.value)} className={inputCls+" max-w-[220px]"}>
          <option value="tutto">Tutto lo storico</option>
          {mesi.map(m=><option key={m} value={m}>{etichettaMese(m)}</option>)}
        </select>
      </div>

      <Card className="mb-5">
        <h3 className="font-bold mb-1">Spese fisse settimanali</h3>
        <p className="text-[11px] text-slate-500 mb-3">Dedotte da ogni settimana prima della divisione. Salvate automaticamente.</p>
        <div className="grid grid-cols-3 gap-3">
          <Field label="Locale (€)"><Input type="number" value={locale} onChange={e=>setCfg("speseLocale",e.target.value)} /></Field>
          <Field label="Benzina (€)"><Input type="number" value={benzina} onChange={e=>setCfg("speseBenzina",e.target.value)} /></Field>
          <Field label="Quota A (%)"><Input type="number" value={splitPerc} onChange={e=>setCfg("splitPerc",e.target.value)} /></Field>
        </div>
      </Card>

      <div className="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-5">
        <Card><div className="text-xs text-slate-400">Incassato</div><div className="text-xl font-black">{euro(tot.inc)}</div></Card>
        <Card><div className="text-xs text-slate-400">Spese ({settimane.length} sett.)</div><div className="text-xl font-black text-red-400">−{euro(tot.spese)}</div></Card>
        <Card><div className="text-xs text-slate-400 truncate">{nomeA}</div><div className="text-xl font-black text-emerald-400">{euro(tot.qA)}</div></Card>
        <Card><div className="text-xs text-slate-400 truncate">{nomeB}</div><div className="text-xl font-black text-violet-400">{euro(tot.qB)}</div></Card>
      </div>

      <Card className="overflow-x-auto">
        <h3 className="font-bold mb-3">Dettaglio settimanale</h3>
        <table className="w-full text-sm min-w-[720px]">
          <thead>
            <tr className="text-left text-xs uppercase tracking-wide text-slate-500 border-b border-[#1d1d2b]">
              <th className="py-2 pr-2">Settimana</th>
              <th className="py-2 px-2 text-right">Incassato</th>
              <th className="py-2 px-2 text-right">Contanti</th>
              <th className="py-2 px-2 text-right">Carta</th>
              <th className="py-2 px-2 text-right">Spese</th>
              <th className="py-2 px-2 text-right">Provvigioni</th>
              <th className="py-2 px-2 text-right">Netto</th>
              <th className="py-2 px-2 text-right text-emerald-400">{nomeA}</th>
              <th className="py-2 pl-2 text-right text-violet-400">{nomeB}</th>
            </tr>
          </thead>
          <tbody>
            {settimane.map(s=>(
              <tr key={s.w} className="border-b border-[#15151f]">
                <td className="py-2 pr-2 font-medium">{range(s.w)}</td>
                <td className="py-2 px-2 text-right">{euro(s.inc)}</td>
                <td className="py-2 px-2 text-right text-slate-400">{euro(s.Contanti)}</td>
                <td className="py-2 px-2 text-right text-slate-400">{euro(s.Carta)}</td>
                <td className="py-2 px-2 text-right text-red-400">−{euro(s.spese)}</td>
                <td className="py-2 px-2 text-right text-red-400">{s.prov>0?"−"+euro(s.prov):"—"}</td>
                <td className="py-2 px-2 text-right font-semibold">{euro(s.netto)}</td>
                <td className="py-2 px-2 text-right text-emerald-400 font-bold">{euro(s.quotaA)}</td>
                <td className="py-2 pl-2 text-right text-violet-400 font-bold">{euro(s.quotaB)}</td>
              </tr>
            ))}
            {settimane.length===0 && <tr><td colSpan={9} className="py-8 text-center text-slate-500">Nessun incasso in questo periodo.</td></tr>}
          </tbody>
        </table>
        <p className="text-[11px] text-slate-500 mt-3">Ogni settimana: incassato − {euro(locale)} locale − {euro(benzina)} benzina − provvigioni Francesco, poi diviso {splitPerc}/{100-splitPerc}.</p>
      </Card>
    </div>
  );
}

      <Card className="mb-4">
        <h3 className="font-bold mb-1">PIN di accesso</h3>
        <p className="text-[11px] text-slate-500 mb-3">Cambia i codici dei tre utenti. Si applicano al prossimo accesso.</p>
        {Object.keys(UTENTI).map(u=>(
          <div key={u} className="flex items-center gap-3 mb-2">
            <div className="w-8 h-8 rounded-full grid place-items-center font-bold text-black text-sm" style={{background:UTENTI[u].color}}>{UTENTI[u].nome[0]}</div>
            <div className="flex-1 text-sm font-medium">{UTENTI[u].nome}</div>
            <input value={form[u]} onChange={e=>set(u,e.target.value)} className={inputCls+" max-w-[120px] text-center"} />
          </div>
        ))}
      </Card>
      <Card className="mb-4">
        <h3 className="font-bold mb-1">Cassa & divisione</h3>
        <p className="text-[11px] text-slate-500 mb-3">Spese fisse settimanali e ripartizione. Valgono per la Cassa e per il Fatturato di Carlo.</p>
        <div className="grid grid-cols-3 gap-3 mb-3">
          <Field label="Locale (€)"><Input type="number" value={form.speseLocale} onChange={e=>set("speseLocale",e.target.value)} /></Field>
          <Field label="Benzina (€)"><Input type="number" value={form.speseBenzina} onChange={e=>set("speseBenzina",e.target.value)} /></Field>
          <Field label="Quota A (%)"><Input type="number" value={form.splitPerc} onChange={e=>set("splitPerc",e.target.value)} /></Field>
        </div>
        <div className="grid grid-cols-2 gap-3">
          <Field label="Nome Quota A"><Input value={form.quotaA} onChange={e=>set("quotaA",e.target.value)} placeholder="Es. Giuseppe" /></Field>
          <Field label="Nome Quota B"><Input value={form.quotaB} onChange={e=>set("quotaB",e.target.value)} placeholder="Es. Carlo" /></Field>
        </div>
      </Card>
      <div className="flex items-center gap-3">
        <Btn onClick={salva}>Salva impostazioni</Btn>
        {salvato && <span className="text-emerald-400 text-sm font-semibold">Salvato ✓</span>}
      </div>
    </div>
  );
}

// ============================================================
//  PROVVIGIONI
// ============================================================
function Provvigioni({data, setData, user}) {
  const provv = data.provvigioni||[];
  const nome = id=>(data.clienti.find(c=>c.id===id)||{}).nome||"—";
  const setStato = (id,stato)=>{ setData(d=>({...d, provvigioni:(d.provvigioni||[]).map(p=>p.id===id?{...p,stato}:p)})); toast("Provvigione "+stato+" ✓"); };
  const setBase = (id,val)=> setData(d=>({...d, provvigioni:(d.provvigioni||[]).map(p=>p.id===id?{...p, base:(val===""?null:Number(val))}:p)}));
  const setIncasso = (id,incassoId)=> setData(d=>({...d, provvigioni:(d.provvigioni||[]).map(p=>p.id===id?{...p, incassoId:(incassoId||undefined)}:p)}));
  const pagamentiCliente = (p)=> data.incassi.filter(i=>i.clienteId===p.clienteId || !i.clienteId).sort((a,b)=>(b.data||"").localeCompare(a.data||"")).slice(0,25);
  const elimina = (id)=>{ if(confirm("Eliminare questa richiesta?")) setData(d=>({...d, provvigioni:(d.provvigioni||[]).filter(p=>p.id!==id)})); };
  const isG = user==="giuseppe";
  const visibili = isG ? provv : provv.filter(p=>p.richiestoDa===UTENTI[user].nome);
  const byStato = (s)=> visibili.filter(p=>p.stato===s).sort((a,b)=>(b.dataSessione||"").localeCompare(a.dataSessione||""));
  const Riga = ({p, children})=>{ const auto=provBaseAuto(p,data.incassi); const base=provBase(p,data.incassi); const imp=provImporto(p,data.incassi); return (
    <Card className="py-3">
      <div className="flex items-center gap-3">
        <div className="flex-1 min-w-0">
          <div className="text-sm font-semibold truncate">{nome(p.clienteId)} <span className="text-slate-400 font-normal">· {dataIt(p.dataSessione)}</span></div>
          <div className="text-xs text-slate-400">{p.perc}% {base>0 ? "di "+euro(base)+" = "+euro(imp) : "· importo da confermare"}</div>
        </div>
        <Badge color={PROV_COLORI[p.stato]}>{p.stato}</Badge>
        {children}
      </div>
      {isG && (
        <div className="mt-2 pt-2 border-t border-[#1d1d2b] space-y-2">
          <div className="flex items-center gap-2 flex-wrap">
            <span className="text-[11px] text-slate-500 w-32">Pagamento collegato:</span>
            <select value={p.incassoId||""} onChange={e=>setIncasso(p.id, e.target.value)} className={inputCls+" max-w-[280px] py-1 text-sm"}>
              <option value="">— automatico / a mano —</option>
              {pagamentiCliente(p).map(i=><option key={i.id} value={i.id}>{dataIt(i.data)} · {euro(i.pagato)} · {i.descrizione||"—"}{i.clienteId?"":" (generico)"}</option>)}
            </select>
          </div>
          {!p.incassoId && (
            <div className="flex items-center gap-2 flex-wrap">
              <span className="text-[11px] text-slate-500 w-32">…oppure base € a mano:</span>
              <input type="number" value={p.base!=null?p.base:""} onChange={e=>setBase(p.id, e.target.value)} placeholder={auto>0?String(auto):"importo"} className={inputCls+" max-w-[120px] py-1 text-sm"} />
              {p.base==null && auto>0 && <span className="text-[11px] text-emerald-400">auto: {euro(auto)} ✓</span>}
              {p.base==null && auto===0 && <span className="text-[11px] text-amber-400">nessun pagamento agganciato in automatico</span>}
            </div>
          )}
        </div>
      )}
    </Card>
  );};
  const totApprovate = visibili.filter(p=>["approvata","liquidata"].includes(p.stato)).reduce((s,p)=>s+provImporto(p,data.incassi),0);

  return (
    <div className="fade-in">
      <h1 className="text-2xl font-black mb-1">Provvigioni</h1>
      <p className="text-slate-400 text-sm mb-5">{isG ? "Approva le richieste di Francesco e conferma l'importo base (se pagamento e appuntamento non combaciano, scrivilo a mano). Le approvate vengono detratte dal lordo settimanale in Cassa." : "Le tue richieste di provvigione. Vengono approvate da Giuseppe."}</p>

      {isG && byStato("richiesta").length>0 && (
        <div className="mb-6">
          <div className="text-xs uppercase tracking-wide text-amber-400 font-semibold mb-2">Da approvare ({byStato("richiesta").length})</div>
          <div className="space-y-2">
            {byStato("richiesta").map(p=>(
              <Riga key={p.id} p={p}>
                <div className="flex gap-1.5 shrink-0">
                  <button onClick={()=>setStato(p.id,"approvata")} className="px-3 py-1.5 rounded-xl text-xs font-semibold bg-emerald-500 hover:bg-emerald-400 text-black">Approva</button>
                  <button onClick={()=>setStato(p.id,"rifiutata")} className="px-3 py-1.5 rounded-xl text-xs font-semibold border border-red-500/40 text-red-400 hover:bg-red-500/10">Rifiuta</button>
                </div>
              </Riga>
            ))}
          </div>
        </div>
      )}

      {(isG ? byStato("approvata") : []).length>0 && (
        <div className="mb-6">
          <div className="flex items-center justify-between mb-2">
            <div className="text-xs uppercase tracking-wide text-emerald-400 font-semibold">Approvate — da detrarre ({byStato("approvata").length})</div>
            <div className="text-sm font-bold">Totale {euro(totApprovate)}</div>
          </div>
          <div className="space-y-2">
            {byStato("approvata").map(p=>(
              <Riga key={p.id} p={p}>
                <button onClick={()=>setStato(p.id,"liquidata")} className="px-3 py-1.5 rounded-xl text-xs font-semibold border border-[#26263a] text-slate-300 hover:bg-[#1a1a28] shrink-0">Segna liquidata</button>
              </Riga>
            ))}
          </div>
        </div>
      )}

      {!isG && (
        <div className="space-y-2">
          {visibili.sort((a,b)=>(b.dataSessione||"").localeCompare(a.dataSessione||"")).map(p=>(
            <Riga key={p.id} p={p}>
              {p.stato==="richiesta" && <button onClick={()=>elimina(p.id)} className="text-xs text-red-400/70 hover:text-red-400 shrink-0">Annulla</button>}
            </Riga>
          ))}
          {visibili.length===0 && <Card className="text-center text-slate-500 py-10">Nessuna richiesta. Vai in Appuntamenti, apri una sessione e richiedi la provvigione.</Card>}
        </div>
      )}

      {isG && (byStato("liquidata").length>0 || byStato("rifiutata").length>0) && (
        <div>
          <div className="text-xs uppercase tracking-wide text-slate-500 font-semibold mb-2">Storico</div>
          <div className="space-y-2">
            {[...byStato("liquidata"),...byStato("rifiutata")].map(p=>(
              <Riga key={p.id} p={p}>
                <button onClick={()=>elimina(p.id)} className="text-xs text-red-400/70 hover:text-red-400 shrink-0">Elimina</button>
              </Riga>
            ))}
          </div>
        </div>
      )}

      {isG && provv.length===0 && <Card className="text-center text-slate-500 py-10">Nessuna provvigione richiesta finora.</Card>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
